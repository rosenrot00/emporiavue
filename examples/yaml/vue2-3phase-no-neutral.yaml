# Advanced Emporia Vue 2 3phase setup without neutral in the measured panel.
#
# WARNING: This is not a generic recommendation to rewire the Vue voltage
# reference. Only use this pattern if the installation has been electrically
# reviewed and you understand the safety implications.
#
# Assumption used by this example:
# - Vue neutral/reference terminal is intentionally wired to L2.
# - line_1 measures L1-L2 via the BLACK voltage input.
# - line_2 is L2-L2 and should be close to 0 V, so it is hidden.
# - line_3 measures L3-L2 via the BLUE voltage input.
# - A load between L1-L3 can be calculated with line: [1, 3].

esphome:
  name: vue2-no-neutral
  friendly_name: Vue2 No Neutral

external_components:
  - source:
      type: git
      url: https://github.com/rosenrot00/emporiavue.git
      ref: main
    components:
      - emporiavue
    refresh: always

packages:
  emporiavue:
    url: https://github.com/rosenrot00/emporiavue.git
    ref: main
    files:
      - packages/vue2-i2c.yaml
      - packages/vue2-3phase.yaml
    refresh: always

esp32:
  board: esp32dev
  cpu_frequency: 160MHz
  framework:
    type: esp-idf
    version: recommended

api:
  encryption:
    key: !secret ha_enc_key

ota:
  - platform: esphome
    password: !secret ota_password
    allow_partition_access: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

logger:
  logs:
    sensor: INFO

preferences:
  flash_write_interval: never

time:
  - platform: sntp
    id: my_time
    timezone: "Europe/Vienna"

.defaultfilters:
  - &throttle_avg
    throttle_average: 5s
  - &throttle_time
    throttle: 60s
  - &pos
    lambda: 'return max(x, 0.0f);'

emporiavue:
  mains:
    line_1:
      voltage:
        name: "Voltage L1-L2"
        filters: [*throttle_avg, *pos]
      frequency:
        filters: [*throttle_avg, *pos]
      power:
        internal: true

    line_2:
      voltage:
        internal: true
      phase_angle:
        internal: true
      power:
        internal: true

    line_3:
      voltage:
        name: "Voltage L3-L2"
        filters: [*throttle_avg, *pos]
      phase_angle:
        filters: [*throttle_avg, *pos]
      power:
        internal: true

  circuits:
    cir1:
      line: 1
      power:
        name: "AC L1-L2 Power"
        filters: [*pos, *throttle_avg]

    cir2:
      line: 3
      power:
        name: "AC L2-L3 Power"
        filters: [*pos, *throttle_avg]

    cir3:
      line: [1, 3]
      # If the CT direction or line order gives negative power, uncomment this:
      # filters:
      #   - multiply: -1
      power:
        name: "AC L1-L3 Power"
        filters: [*pos, *throttle_avg]

sensor:
  - platform: total_daily_energy
    name: "Today’s AC L1-L2 Energy"
    power_id: cir1
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    restore: true
    method: left
    accuracy_decimals: 2
    filters:
      - multiply: 0.001
      - *throttle_time

  - platform: total_daily_energy
    name: "Today’s AC L2-L3 Energy"
    power_id: cir2
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    restore: true
    method: left
    accuracy_decimals: 2
    filters:
      - multiply: 0.001
      - *throttle_time

  - platform: total_daily_energy
    name: "Today’s AC L1-L3 Energy"
    power_id: cir3
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    restore: true
    method: left
    accuracy_decimals: 2
    filters:
      - multiply: 0.001
      - *throttle_time
