# Emporia Vue 3 single-phase metering topology.
#
# Include this together with packages/vue3-i2c.yaml. Vue 3 support is currently
# untested in this repository; verify line and circuit mapping against real
# hardware before relying on the readings.

emporiavue:
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: line_1_voltage
        name: "Line 1 Voltage"
      frequency:
        id: line_1_frequency
        name: "Line 1 Frequency"
      power:
        id: line_1_power
        name: "Line 1 Power"
  groups:
    grid:
      name: "Grid"
      sources: [line_1]
  # Override circuits.<id>.line in the main node YAML if needed. Add
  # circuits.<id>.power there only for circuits that should be visible in Home
  # Assistant. The component automatically keeps every configured circuit
  # available as a stable internal power ID for energy and group calculations.
  circuits:
    cir1:
      input: "1"
      line: 1
      name: "Circuit 1"
    cir2:
      input: "2"
      line: 1
      name: "Circuit 2"
    cir3:
      input: "3"
      line: 1
      name: "Circuit 3"
    cir4:
      input: "4"
      line: 1
      name: "Circuit 4"
    cir5:
      input: "5"
      line: 1
      name: "Circuit 5"
    cir6:
      input: "6"
      line: 1
      name: "Circuit 6"
    cir7:
      input: "7"
      line: 1
      name: "Circuit 7"
    cir8:
      input: "8"
      line: 1
      name: "Circuit 8"
    cir9:
      input: "9"
      line: 1
      name: "Circuit 9"
    cir10:
      input: "10"
      line: 1
      name: "Circuit 10"
    cir11:
      input: "11"
      line: 1
      name: "Circuit 11"
    cir12:
      input: "12"
      line: 1
      name: "Circuit 12"
    cir13:
      input: "13"
      line: 1
      name: "Circuit 13"
    cir14:
      input: "14"
      line: 1
      name: "Circuit 14"
    cir15:
      input: "15"
      line: 1
      name: "Circuit 15"
    cir16:
      input: "16"
      line: 1
      name: "Circuit 16"
