# Emporia Vue 2 internal SAMD09 preset for three-phase I2C metering.
#
# Keep external_components in the main node YAML so private GitHub credentials
# can stay in secrets.yaml. This package only adds the ESP32 backup partition
# and the emporiavue component configuration.
#
# When adding this package to an already-flashed ESP32, update the partition
# table once before using the backup/update/restore buttons. ESPHome requires
# `allow_partition_access: true` on the esphome OTA platform for that step.

esp32:
  partitions:
    - name: samd_bak
      type: data
      subtype: undefined
      size: 0x10000

emporiavue:
  id: samd_reader
  hardware: vue2
  mode: i2c
  metering_interval: 10s
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: new_phase_a_voltage
        name: "NEW_Phase A Voltage"
      frequency:
        id: new_phase_a_frequency
        name: "NEW_Phase A Frequency"
      power:
        id: new_phase_a_power
        name: "NEW_Phase A Power"
    line_2:
      voltage_input: RED
      main_clamp: B
      calibration: 0.022
      voltage:
        id: new_phase_b_voltage
        name: "NEW_Phase B Voltage"
      phase_angle:
        id: new_phase_b_phase_angle
        name: "NEW_Phase B Phase Angle"
      power:
        id: new_phase_b_power
        name: "NEW_Phase B Power"
    line_3:
      voltage_input: BLUE
      main_clamp: C
      calibration: 0.022
      voltage:
        id: new_phase_c_voltage
        name: "NEW_Phase C Voltage"
      phase_angle:
        id: new_phase_c_phase_angle
        name: "NEW_Phase C Phase Angle"
      power:
        id: new_phase_c_power
        name: "NEW_Phase C Power"
  backup_partition: samd_bak
  connect_under_reset: true

  firmware_version:
    name: "SAMD Firmware Version"
  bundled_firmware_version:
    name: "SAMD Bundled Firmware Version"

  backup_firmware_button:
    name: "Read SAMD Firmware"
  install_firmware_button:
    name: "Flash SAMD Bundled Firmware"
  restore_firmware_button:
    name: "Flash SAMD Backup Firmware"
