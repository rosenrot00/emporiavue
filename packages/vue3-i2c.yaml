# Emporia Vue 3 I2C preset.
#
# Include this with exactly one Vue 3 topology package. Vue 3 support is still
# untested in this repository; this package uses the community-reported Vue 3
# I2C pins and keeps SAMD auto-update disabled.

i2c:
  sda:
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  frequency: 400kHz
  timeout: 1ms

emporiavue:
  id: samd_reader
  hardware: vue3
  mode: i2c
  auto_update_samd: false
