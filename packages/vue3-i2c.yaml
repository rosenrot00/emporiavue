# Emporia Vue 3 SAMD09 management preset.
#
# Vue 3 uses the same normal 284 byte SAMD I2C metering frame in the upstream
# ESPHome component, but the bundled managed SAMD firmware in this repository is
# currently a Vue 2 image. This package therefore enables firmware detection,
# backup, restore-from-backup, and diagnostics, while managed firmware update is
# blocked until a Vue 3 SAMD image is added.
#
# Keep external_components in the main node YAML so private GitHub credentials
# can stay in secrets.yaml. When adding this package to an already-flashed ESP32,
# update the partition table once before using backup/update/restore. ESPHome requires
# `allow_partition_access: true` on the esphome OTA platform for that step.

esp32:
  partitions:
    - name: samd_bak
      type: data
      subtype: undefined
      size: 0x10000

emporiavue:
  id: samd_reader
  hardware: vue3
  mode: i2c
  backup_partition: samd_bak

  firmware_status:
    name: "SAMD Firmware Status"
  firmware_version:
    name: "SAMD Firmware Version"

  backup_firmware_button:
    name: "Backup SAMD09 Firmware"
  install_firmware_button:
    name: "Update SAMD09 Firmware"
  restore_firmware_button:
    name: "Restore SAMD09 Backup Firmware"
