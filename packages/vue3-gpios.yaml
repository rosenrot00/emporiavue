# Optional Emporia Vue 3 non-I2C GPIO helpers.
#
# GPIO2 is expected to be the WiFi status output.
# GPIO4 is expected to be the Ethernet status output.
#
# The active network transport's status GPIO blinks while connecting or
# reconnecting and stays on once the node has a network connection. The inactive
# network transport's status GPIO is kept off.

output:
  - platform: gpio
    id: vue3_gpio2_wifi_status_led
    pin:
      number: GPIO2
      ignore_strapping_warning: true
  - platform: gpio
    id: vue3_gpio4_ethernet_status_led
    pin:
      number: GPIO4
      ignore_strapping_warning: true

interval:
  - interval: 250ms
    then:
      - lambda: |-
          #ifdef USE_NETWORK
          const bool connected = esphome::network::is_connected();
          #else
          const bool connected = false;
          #endif

          static bool blink_state = false;
          blink_state = connected ? true : !blink_state;

          #ifdef USE_WIFI
          if (blink_state) {
            id(vue3_gpio2_wifi_status_led).turn_on();
          } else {
            id(vue3_gpio2_wifi_status_led).turn_off();
          }
          id(vue3_gpio4_ethernet_status_led).turn_off();
          #elif defined(USE_ETHERNET)
          id(vue3_gpio2_wifi_status_led).turn_off();
          if (blink_state) {
            id(vue3_gpio4_ethernet_status_led).turn_on();
          } else {
            id(vue3_gpio4_ethernet_status_led).turn_off();
          }
          #else
          id(vue3_gpio2_wifi_status_led).turn_off();
          id(vue3_gpio4_ethernet_status_led).turn_off();
          #endif
