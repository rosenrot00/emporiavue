# Emporia Vue 2 three-phase metering topology.
#
# Include this together with packages/vue2-i2c.yaml. The base package defines
# hardware, transport, firmware handling, and SWD; this package only describes
# the electrical line mapping and the comparison metering sensors.

emporiavue:
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: new_phase_a_voltage
        name: "NEW_Phase A Voltage"
      frequency:
        id: new_phase_a_frequency
        name: "NEW_Phase A Frequency"
      power:
        id: new_phase_a_power
        name: "NEW_Phase A Power"
    line_2:
      voltage_input: RED
      main_clamp: B
      calibration: 0.022
      voltage:
        id: new_phase_b_voltage
        name: "NEW_Phase B Voltage"
      phase_angle:
        id: new_phase_b_phase_angle
        name: "NEW_Phase B Phase Angle"
      power:
        id: new_phase_b_power
        name: "NEW_Phase B Power"
    line_3:
      voltage_input: BLUE
      main_clamp: C
      calibration: 0.022
      voltage:
        id: new_phase_c_voltage
        name: "NEW_Phase C Voltage"
      phase_angle:
        id: new_phase_c_phase_angle
        name: "NEW_Phase C Phase Angle"
      power:
        id: new_phase_c_power
        name: "NEW_Phase C Power"
