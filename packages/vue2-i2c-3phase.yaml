# Emporia Vue 2 three-phase metering topology.
#
# Include this together with packages/vue2-i2c.yaml. The base package defines
# hardware, transport, firmware handling, and SWD; this package only describes
# the electrical line mapping and the comparison metering sensors.

emporiavue:
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: line_1_voltage
        name: "Line 1 Voltage"
      frequency:
        id: line_1_frequency
        name: "Line 1 Frequency"
      power:
        id: line_1_power
        name: "Line 1 Power"
    line_2:
      voltage_input: RED
      main_clamp: B
      calibration: 0.022
      voltage:
        id: line_2_voltage
        name: "Line 2 Voltage"
      phase_angle:
        id: line_2_phase_angle
        name: "Line 2 Phase Angle"
      power:
        id: line_2_power
        name: "Line 2 Power"
    line_3:
      voltage_input: BLUE
      main_clamp: C
      calibration: 0.022
      voltage:
        id: line_3_voltage
        name: "Line 3 Voltage"
      phase_angle:
        id: line_3_phase_angle
        name: "Line 3 Phase Angle"
      power:
        id: line_3_power
        name: "Line 3 Power"
  total_power:
    id: total_power
    name: "Total Power"
  grid_import_power:
    id: grid_import_w
    name: "Grid Import Power"
  grid_export_power:
    id: grid_export_w
    name: "Grid Export Power"
  # Override circuits.<id>.line in the main node YAML when a branch CT is
  # installed on a different line. Add circuits.<id>.power there only for
  # circuits that should be visible in Home Assistant; these package defaults
  # keep all branch CTs available as stable internal power IDs for energy and
  # group calculations.
  circuits:
    cir1:
      input: "1"
      line: 2
      raw_power:
        id: cir1
        internal: true
    cir2:
      input: "2"
      line: 3
      raw_power:
        id: cir2
        internal: true
    cir3:
      input: "3"
      line: 1
      raw_power:
        id: cir3
        internal: true
    cir4:
      input: "4"
      line: 2
      raw_power:
        id: cir4
        internal: true
    cir5:
      input: "5"
      line: 3
      raw_power:
        id: cir5
        internal: true
    cir6:
      input: "6"
      line: 3
      raw_power:
        id: cir6
        internal: true
  groups:
    balance_power:
      circuits: [total_power, -cir1, -cir2, -cir3, -cir4, -cir5, -cir6]
      filters:
        - lambda: |-
            return x > 0.0f ? x : 0.0f;
      power:
        id: balance_power
        name: "Balance Power"
