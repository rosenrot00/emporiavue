# Emporia Vue 2 three-phase metering topology.
#
# Include this together with packages/vue2-i2c.yaml. The base package defines
# hardware, transport, firmware handling, and SWD; this package only describes
# the electrical line mapping and the comparison metering sensors.

emporiavue:
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: phase_a_voltage
        name: "Phase A Voltage"
      frequency:
        id: phase_a_frequency
        name: "Phase A Frequency"
      power:
        id: phase_a_power
        name: "Phase A Power"
    line_2:
      voltage_input: RED
      main_clamp: B
      calibration: 0.022
      voltage:
        id: phase_b_voltage
        name: "Phase B Voltage"
      phase_angle:
        id: phase_b_phase_angle
        name: "Phase B Phase Angle"
      power:
        id: phase_b_power
        name: "Phase B Power"
    line_3:
      voltage_input: BLUE
      main_clamp: C
      calibration: 0.022
      voltage:
        id: phase_c_voltage
        name: "Phase C Voltage"
      phase_angle:
        id: phase_c_phase_angle
        name: "Phase C Phase Angle"
      power:
        id: phase_c_power
        name: "Phase C Power"
  total_power:
    id: total_power
    name: "Total Power"
  grid_import_power:
    id: grid_import_w
    name: "Grid Import Power"
  grid_export_power:
    id: grid_export_w
    name: "Grid Export Power"
  # Override only circuits.<id>.line in the main node YAML when a branch CT is
  # installed on a different line.
  circuits:
    cir1:
      input: "1"
      line: 2
      power:
        id: cir1
        name: "Circuit 1 Power"
    cir2:
      input: "2"
      line: 3
      power:
        id: cir2
        name: "Circuit 2 Power"
    cir3:
      input: "3"
      line: 1
      power:
        id: cir3
        name: "Circuit 3 Power"
    cir4:
      input: "4"
      line: 2
      power:
        id: cir4
        name: "Circuit 4 Power"
    cir5:
      input: "5"
      line: 3
      power:
        id: cir5
        name: "Circuit 5 Power"
    cir6:
      input: "6"
      line: 3
      power:
        id: cir6
        name: "Circuit 6 Power"
