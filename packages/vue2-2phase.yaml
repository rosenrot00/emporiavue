# Emporia Vue 2 two-phase metering topology.
#
# Include this together with packages/vue2-i2c.yaml or packages/vue2-spi.yaml.
# The base package defines hardware, transport, firmware handling, and SWD;
# this package only describes
# the electrical line mapping and the comparison metering sensors.

emporiavue:
  mains:
    line_1:
      voltage_input: BLACK
      main_clamp: A
      calibration: 0.022
      voltage:
        id: line_1_voltage
        name: "Line 1 Voltage"
      frequency:
        id: line_1_frequency
        name: "Line 1 Frequency"
      power:
        id: line_1_power
        name: "Line 1 Power"
    line_2:
      voltage_input: RED
      main_clamp: B
      calibration: 0.022
      voltage:
        id: line_2_voltage
        name: "Line 2 Voltage"
      phase_angle:
        id: line_2_phase_angle
        name: "Line 2 Phase Angle"
      power:
        id: line_2_power
        name: "Line 2 Power"
  groups:
    grid:
      name: "Grid"
      sources: [line_1, line_2]
  # Override circuits.<id>.line in the main node YAML when a branch CT is
  # installed on a different line. Use line: [1, 2] for a line-to-line load
  # measured by that physical CT port. Add circuits.<id>.power there only for
  # circuits that should be visible in Home Assistant. The component
  # automatically keeps every configured circuit available as a stable internal
  # power ID for energy and group calculations.
  circuits:
    cir1:
      input: "1"
      line: 1
      name: "Circuit 1"
    cir2:
      input: "2"
      line: 1
      name: "Circuit 2"
    cir3:
      input: "3"
      line: 1
      name: "Circuit 3"
    cir4:
      input: "4"
      line: 1
      name: "Circuit 4"
    cir5:
      input: "5"
      line: 1
      name: "Circuit 5"
    cir6:
      input: "6"
      line: 1
      name: "Circuit 6"
    cir7:
      input: "7"
      line: 1
      name: "Circuit 7"
    cir8:
      input: "8"
      line: 1
      name: "Circuit 8"
    cir9:
      input: "9"
      line: 1
      name: "Circuit 9"
    cir10:
      input: "10"
      line: 1
      name: "Circuit 10"
    cir11:
      input: "11"
      line: 1
      name: "Circuit 11"
    cir12:
      input: "12"
      line: 1
      name: "Circuit 12"
    cir13:
      input: "13"
      line: 1
      name: "Circuit 13"
    cir14:
      input: "14"
      line: 1
      name: "Circuit 14"
    cir15:
      input: "15"
      line: 1
      name: "Circuit 15"
    cir16:
      input: "16"
      line: 1
      name: "Circuit 16"
